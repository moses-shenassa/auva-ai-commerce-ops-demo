name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run demo
        run: python -m auva_demo.cli --case data/synthetic_cases.jsonl

      - name: Run interview demo
        run: python scripts/interview_demo.py

      - name: Run synthetic evaluation scoreboard
        run: python scripts/evaluate_demo.py --case data/synthetic_cases.jsonl
